<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:linear-gradient(135deg,#f5f0e8 0%,#e8e0d0 100%);min-height:100vh;color:#3a3228;}
#app{max-width:480px;margin:0 auto;min-height:100vh;padding:16px;position:relative;}
.scene{animation:fadeIn .35s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

/* splash */
.splash{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:90vh;text-align:center;}
.splash-icon{font-size:60px;margin-bottom:20px;}
.splash h1{font-size:22px;font-weight:700;color:#3a3228;margin-bottom:8px;}
.splash p{font-size:14px;color:#8a7a68;margin-bottom:24px;line-height:1.6;}
.splash-btn{background:#8b3a2a;color:#fff;border:none;padding:12px 32px;border-radius:24px;font-size:16px;cursor:pointer;font-family:inherit;box-shadow:0 2px 8px rgba(139,58,42,0.3);}

/* header */
.hdr{display:flex;align-items:center;gap:8px;margin-bottom:16px;padding:12px 16px;background:rgba(255,255,255,.7);backdrop-filter:blur(10px);border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.hdr .ic{font-size:28px;line-height:1;}
.hdr .tt{font-size:16px;font-weight:600;color:#3a3228;flex:1;}

/* story bubbles */
.speech-bubble{background:#fff;border-radius:12px;padding:14px;margin:10px 0;line-height:1.8;font-size:14px;box-shadow:0 1px 3px rgba(0,0,0,.06);position:relative;}
.speech-bubble::before{content:'';position:absolute;top:-6px;left:18px;width:12px;height:12px;background:#fff;transform:rotate(45deg);}
.tag{display:inline-block;background:#8b3a2a;color:#fff;font-size:11px;padding:2px 8px;border-radius:4px;margin-bottom:6px;font-weight:600;}
.strategy-box{background:#f5efe4;border-left:3px solid #8b3a2a;padding:10px 12px;margin:10px 0;border-radius:0 6px 6px 0;font-size:13px;line-height:1.6;}
strong{color:#8b3a2a;font-weight:600;}
.story p{margin-bottom:10px;line-height:1.8;font-size:14px;}

/* buttons */
.btn{display:block;width:100%;background:#fff;border:1.5px solid #d0c8b8;border-radius:10px;padding:12px 16px;font-size:14px;cursor:pointer;font-family:inherit;color:#3a3228;text-align:left;margin:6px 0;min-height:44px;}
.btn:active{transform:scale(.98);border-color:#8b3a2a;background:#faf7f2;}
.btn.g{border-color:#5a8a5a;background:#f0f5ec;}
.btn.w{border-color:#b05050;background:#fcf0f0;}
.btn-group{margin-top:16px;padding-bottom:40px;}

/* listen btn */
.ln-btn{background:transparent;border:1px solid #d0c8b8;color:#6a5c4c;padding:4px 12px;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit;margin-top:6px;}
.ln-btn:active{background:rgba(0,0,0,.04);}

/* QA */
.qa-card{background:#fff;border-radius:10px;margin-bottom:8px;overflow:hidden;}
.qa-q{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer;font-size:14px;font-weight:500;min-height:44px;user-select:none;}
.qa-q .x{font-size:18px;color:#8a7a68;transition:transform .2s;flex-shrink:0;margin-left:8px;}
.qa-q .x.o{transform:rotate(45deg);}
.qa-a{display:none;padding:0 14px 12px;border-top:1px solid #f0ece4;}
.qa-a.o{display:block;}

/* quiz feedback */
.fb-box{background:#fff;border-radius:10px;padding:14px;margin:12px 0;line-height:1.7;font-size:14px;border-left:3px solid #5a8a5a;}
.fb-box.wr{border-left-color:#b05050;}

/* result */
.end-box{text-align:center;padding:40px 0;line-height:2;font-size:15px;}
.end-box .big{font-size:40px;margin-bottom:10px;}

#ap{display:none;}
</style>

function tQ(el){
  var a=el.nextElementSibling;
  var x=el.querySelector('.x');
  if(!a||!x)return;
  var o=a.classList.contains('o');
  if(o){a.classList.remove('o');x.classList.remove('o');}
  else{a.classList.add('o');x.classList.add('o');}
}

function showFB(id,idx){
  var d=document.getElementById('fb');if(!d)return;
  var qd=getQuiz(id);if(!qd||!qd.opts[idx])return;
  var opt=qd.opts[idx];
  // 播放反馈音频
  var fbSrc='https://naidou-audio99-1434426321.cos.ap-guangzhou.myqcloud.com/audio/kh_'+id.replace('quiz','q')+(opt.g?'a':'b')+'.mp3';
  playMp3(fbSrc);
  d.innerHTML='<div class="fb-box'+(opt.g?'':' wr')+'">'+opt.fb+'</div>';
  if(opt.g){
    var n=getNext(id);
    if(n) d.innerHTML+='<button class="btn" onclick="go(\''+n+'\')">'+(n=='end'?'全部完成 🎉':'下一题 →')+'</button>';
  } else {
    d.innerHTML+='<button class="btn" onclick="go(\''+id+'\')">重新回答</button>';
  }
}

    {q:'3. "我平时用气很注意，不会出事"',a:'<div class="strategy-box"><strong>策略：</strong>①巧用案例引导 ②先行赔付，被波及也不怕</div><div class="speech-bubble"><span class="tag">话术</span>燃气的危险性是有目共睹的——自己用气注意，也不能保证百分之百不出事，万一胶管脱落、或家里老人忘记关阀门，都很危险。而且我们的保险还有一个特色：<strong>邻居燃气事故波及到您，而邻居没钱赔，保险公司先赔给您</strong>，您把追偿权转让给保险公司就行。您自己注意，但难保左邻右舍也注意。</div>'},
    {q:'4. "出事了不该燃气公司负责吗？"',a:'<div class="strategy-box"><strong>策略：</strong>①过失原则 ②保险不纠结责任方</div><div class="speech-bubble"><span class="tag">话术</span>燃气的危险性是大家都知道的，天然气公司也尽到最大的责任进行排查，但谁也不能保证百分百，而且如果是业主使用不规范导致的意外，燃气公司没有责任。如果确实燃气公司安检时发现隐患没有提醒，燃气公司承担相应责任，否则不承担责任。但有了保险，我们不纠结是谁的责任，<strong>保险公司先行赔付，客户只管尽快恢复正常生活</strong>，多一份保险多一份保障。</div>'},
    {q:'5. "燃气险和家财险有什么区别？"',a:'<div class="strategy-box"><strong>策略：</strong>讲清互补关系</div><div class="speech-bubble"><span class="tag">话术</span>家财险侧重于财产损失的保障，但往往不包含燃气事故、第三者责任等更细致的风险。燃气险聚焦于<strong>燃气相关的事故保障</strong>，包括火灾、爆炸、中毒等。两者互补。很多客户<strong>两份都买了</strong>，全面保障更安心。</div>'},
    {q:'6. "100/190/270怎么选？哪个划算？"',a:'<div class="strategy-box"><strong>策略：</strong>用日均成本做对比，突出性价比</div><div class="speech-bubble"><span class="tag">话术</span>100的是基础款，只保障燃气事故。190和270的是升级款，不仅保燃气，还保全屋<strong>水电气暖</strong>，还有第三者责任。<strong>一天不到2毛7分钱</strong>，性价比很高。大多数客户选的是<strong>2年或3年的升级款</strong>，保障范围更全面，省心。</div>'}
  ];
}
