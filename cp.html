// ══════ 渲染引擎 ══════
function go(id,noAudio){
  stopSpeak();
  var s=S[id];if(!s)return;
  var c=document.getElementById('content');
  var h='<div class="fade">';
  if(s.icon)h+='<div class="si">'+s.icon+'</div>';
  if(s.title)h+='<div class="st">'+s.title+'</div>';
  h+='<div class="story">'+s.story+'</div>';
  if(s.question)h+='<div class="qt">'+s.question+'</div>';
  if(s.picks&&s.picks.length>0){
    if(!s.question)h+='<div class="qt">点击继续</div>';
    h+='<div class="choices">';
    for(var i=0;i<s.picks.length;i++)h+='<button class="cbtn" onclick="pick(\''+id+'\','+i+')">'+s.picks[i].text+'</button>';
    h+='</div>';
  }
  h+='</div>';
  c.innerHTML=h;
  playBGM();
  if(!noAudio&&s.sceneMp3){
    var ap=document.getElementById('ap');
    if(!ap){
      ap=document.createElement('audio');
      ap.id='ap';ap.style.display='none';
      document.getElementById('app').appendChild(ap);
    } else {
      ap.pause();
      ap.currentTime=0;
    }
    ap.src=s.sceneMp3;ap.volume=0.9;
    ap.play().catch(function(){});
  } else if(!noAudio&&s.audio){
    setTimeout(function(){speak(s.audio);},400);
  }
}
function pick(id,idx){
  var s=S[id];
  var btns=document.querySelectorAll('.cbtn');
  for(var i=0;i<btns.length;i++)btns[i].classList.add('disabled');
  if(s.picks[idx].next&&S[s.picks[idx].next]){
    var nid=s.picks[idx].next;
    // 在用户手势内立即开始播放下一个场景的音频（不走setTimeout，否则移动端会阻止）
    if(S[nid].sceneMp3){
      var ap=document.getElementById('ap');
      if(!ap){
        ap=document.createElement('audio');
        ap.id='ap';ap.style.display='none';
        document.getElementById('app').appendChild(ap);
      } else {
        ap.pause();
        ap.currentTime=0;
      }
      ap.src=S[nid].sceneMp3;ap.volume=0.9;
      ap.play().catch(function(){});
    }
    setTimeout(function(){go(nid,1);},500);
  }
}
