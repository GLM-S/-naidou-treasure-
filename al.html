  h+='</div>';
  c.innerHTML=h;
  playBGM();
  // MP3播放（noAudio时跳过，pick()已提前播放）
  if(!noAudio&&s.sceneMp3){
    var ap=document.getElementById('ap');
    if(!ap){
      ap=document.createElement('audio');
      ap.id='ap';ap.style.display='none';
      document.getElementById('app').appendChild(ap);
    }
    ap.src=s.sceneMp3;
    ap.volume=0.9;
    ap.play().catch(function(){});
    c.innerHTML+='<div style="text-align:center;margin-top:6px;"><button class="replay-btn" onclick="replayMP3()">🔊 重新播放</button></div>';
  }
}
function pick(id,idx){
  var s=S[id];
  var btns=document.querySelectorAll('.cbtn');
  for(var i=0;i<btns.length;i++)btns[i].classList.add('disabled');
  if(s.picks[idx].next&&S[s.picks[idx].next]){
    var nid=s.picks[idx].next;
    // 在用户手势内立即播放下一个场景的音频
    if(S[nid].sceneMp3){
      var ap=document.getElementById('ap');
      if(!ap){
        ap=document.createElement('audio');
        ap.id='ap';ap.style.display='none';
        document.getElementById('app').appendChild(ap);
      }
      ap.src=S[nid].sceneMp3;ap.volume=0.9;
      ap.play().catch(function(){});
    }
    setTimeout(function(){go(nid,1);},500);
  }
}
