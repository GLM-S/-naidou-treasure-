name: 每日科技简报

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  generate-brief:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 安装依赖
        run: pip install requests beautifulsoup4
      
      - name: 运行简报生成脚本
        run: python scripts/daily_brief.py
      
      - name: 提交简报到仓库
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add briefs/
          git commit -m "📊 更新每日科技简报 $(date +'%Y-%m-%d')" || echo "无变化"
          git push
